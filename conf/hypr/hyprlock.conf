# sample hyprlock.conf
# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
#
# rendered text in all widgets supports pango markup (e.g. <b> or <i> tags)
# ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#general-remarks
#
# shortcuts to clear password buffer: ESC, Ctrl+U, Ctrl+Backspace

$font = JetBrains Mono

general {
    hide_cursor = false
    immediate_render = true
}

# uncomment to enable fingerprint authentication
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#         present_message = Scanning...
#         retry_delay = 250 # in milliseconds
#     }
# }

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

# MAIN MONITOR
background {
    monitor = DP-5
    path = /home/krieg/personal/anime/hyprlock-wallpaper-monitor1.jpg

    blur_passes = 2    # Base blure
    blur_size = 5      # Blure intensity
    noise = 0.01       # A bit of texture
}
# SECONDARI MONIOR
background {
    monitor = DP-4
    path = /home/krieg/personal/anime/hyprlock-wallpaper-monitor2.jpg

    blur_passes = 2   # Base blure
    blur_size = 4     # Blure intensity
    noise = 0.01      # A bit of texture
}

# INPUT FIELD
input-field {
    monitor = 
    size = 12%, 3%
    outline_thickness = 3
    
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.35 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true

    inner_color = rgba(0, 0, 0, 0.2) # no fill
    # Current Purple Border
    outer_color = rgba(440070ff) rgba(440070ff) 45deg
    # "Success" - Cyan to Green (Synthweave style)
    check_color = rgba(00f5d4ff) rgba(00bbffff) 120deg
    # "Error" - Neon Red to Electric Magenta
    fail_color = rgba(ff204eff) rgba(ff0066ff) 45deg

    font_color = rgb(143, 143, 143)
    fade_on_empty = false
    rounding = 15

    font_family = $font
    placeholder_text = <i><span foreground="##cdd6f4">Input Password...</span></i>
    fail_text = $PAMFAIL

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 0, -18
    halign = center
    valign = center
}

# WELLCOME MESSAGE SECTION
label {
    monitor =
    text = Hi there, Krieg
    font_size = 14
    font_family = $font
    position = 0, -665
    halign = center
    valign = top
}

# DATE
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = rgba(255, 196, 234, 0.75)
  font_size = 22
  font_family = JetBrains Mono
  position = 0, 300
  halign = center
  valign = center
}

# TIME
label {
  monitor = 
  text = cmd[update:1000] echo "$(date +"%-I:%M")"
  color = rgba(255, 196, 234, 0.75)
  font_size = 95
  font_family = JetBrains Mono Extrabold
  position = 0, 200
  halign = center
  valign = center
}

# WEATHER
label {
    monitor =
    
    # This is the fix:
    # 1. We run the stormy/sed command inside $(...)
    # 2. We use 'echo' to wrap the *entire* multi-line output
    #    in Pango <tt> (monospace) tags.
    # 3. This forces hyprlock to preserve all the leading spaces
    #    and use a monospace font, fixing the alignment.
    text = cmd[update:600000] echo "<tt>$(stormy -city Madrid -units metric | sed 's/\x1B\[[0-9;]*[mK]//g')</tt>"
    
    font_size = 10
    
    # This font_family is now a fallback, as <tt> should handle it.
    font_family = rictydiminished-with-firacode

    position = -35, 35
    halign = right
    valign = bottom
}

# Shows your current keyboard layout, needs to be fixed
# label {
#     monitor = 
#     text = $LAYOUT[en,ru,es,jp]
#     font_size = 24
#     onclick = hyprctl switchxkblayout all next
# 
#     position = 300, -20
#     halign = center
#     valign = center
# }

# EQUALIZER + NOW PLAYING
source = ~/.config/hypr/modules/hyprlock-eq/labels.conf
