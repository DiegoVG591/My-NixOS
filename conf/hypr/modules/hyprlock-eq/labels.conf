# Adapted from Fubi118's hyprlock-eq
# (github.com/Fubi118/hyprlock-eq)

# ============================================= #
#  HYPRLOCK EQUALIZER + NOW PLAYING LABELS      #
#  Sourced by hyprlock.conf                     #
# ============================================= #

# EQUALIZER (top bar)
label {
    monitor =
    text = cmd[update:33] ~/.config/hypr/modules/hyprlock-eq/eq.sh
    color = rgba(227, 217, 197, 1) # white
    font_size = 28
    font_family = JetBrainsMono Nerd Font
    position = 0, 400
    halign = center
    valign = bottom
}

# NOWPLAYING (media title)
label {
    monitor =
    text = cmd[update:5000] ~/.config/hypr/modules/hyprlock-eq/nowplaying.sh
    color = rgba(227, 217, 197, 1) # white
    font_size = 18
    font_family = JetBrainsMono Nerd Font 10
    position = 0, 350
    halign = center
    valign = bottom
}

# EQUALIZER INVERTED (bottom bar)
label {
    monitor =
    text = cmd[update:33] ~/.config/hypr/modules/hyprlock-eq/eq_inverted.sh
    color = rgba(227, 217, 197, 1) # white
    font_size = 28
    font_family = JetBrainsMono Nerd Font
    position = 0, 300
    halign = center
    valign = bottom
}
